    <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@500;700&family=Noto+Serif+Bengali:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* =======================================
        ১. সাধারণ স্টাইল ও অ্যানিমেশন 
        =======================================
        */
       #eventPopupOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw; 
            height: 100vh; 
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000; 
            cursor: pointer; 
            opacity: 1;
            transition: opacity 0.5s ease-out;
            padding: 20px;
            box-sizing: border-box;
        }

        #popupContent {
            border-radius: 20px;
            padding: 40px 40px 30px; 
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            transform: scale(0.9);
            animation: smoothPop 1.2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 95%;
            width: 500px;
            max-height: 85vh; 
            overflow-y: auto; 
            position: relative;
            cursor: default;
            border: 5px solid #fff;
            box-sizing: border-box;
        }

        #popupContent::-webkit-scrollbar {
            width: 6px;
        }
        #popupContent::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        #closeButton {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            color: inherit; 
            cursor: pointer;
            transition: transform 0.3s, color 0.3s;
            line-height: 1;
            font-family: Arial, sans-serif;
            font-weight: bold;
            opacity: 0.8;
            z-index: 10002;
        }

        #closeButton:hover {
            color: #ff0055 !important;
            transform: rotate(90deg) scale(1.1);
            opacity: 1;
        }

        .popup-cancel-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 8px 20px;
            font-family: 'Noto Serif Bengali', serif;
            font-size: 0.95em;
            font-weight: bold;
            text-decoration: none;
            background-color: rgba(0, 0, 0, 0.1);
            color: inherit;
            border: 1.5px solid currentColor;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .popup-cancel-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            opacity: 1;
            transform: translateY(-2px);
        }

        @keyframes smoothPop {
            0% { transform: scale(0.3) rotate(-15deg); opacity: 0; }
            60% { transform: scale(1.1) rotate(5deg); opacity: 1; }
            80% { transform: scale(0.95) rotate(-2deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotateZ(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotateZ(720deg); opacity: 0.5; }
        }
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: confettiFall linear infinite;
            pointer-events: none;
            z-index: 9999;
        }

        /* =======================================
        ২. ইভেন্ট ও রেজাল্ট-নির্দিষ্ট স্টাইল 
        =======================================
        */
        .school-header {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }

        /* রেজাল্ট ও বিশেষ ঘোষণার আকর্ষণীয় স্টাইল */
        .style-result {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-color: #f1c40f;
            color: #fff;
        }
        .style-result h1 { color: #f1c40f; text-shadow: 2px 2px #000; }
        .style-result h2 { color: #fff; }
        .style-result p { color: #e0e0e0; }
        .style-result .school-header { border-bottom: 2px solid #f1c40f; color: #f1c40f; }
        .style-result #closeButton { color: #f1c40f; }
        
        /* রেজাল্ট টেবিল স্টাইল */
        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            font-family: 'Noto Serif Bengali', serif;
        }
        .result-table th, .result-table td {
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        .result-table th {
            background-color: rgba(241, 197, 15, 0.2);
            color: #f1c40f;
        }

        .style-new-year .school-header { border-bottom: 2px solid #fff; color: #fff; }

        .style-tagore .school-header { border-bottom: 2px solid #8b4513; color: #8b4513; }
        .style-tagore #closeButton { color: #8b4513; }

        .style-environment { background: linear-gradient(135deg, #2ecc71, #27ae60); border-color: #16a085; }
        .style-environment h1, .style-environment h2 { color: #fff; text-shadow: 1px 1px #16a085; }
        .style-environment p { color: #ecf0f1; }
        .style-environment .school-header { border-bottom: 2px solid #ecf0f1; color: #ecf0f1; }
        .style-environment #closeButton { color: #fff; }

        .style-science { background: linear-gradient(135deg, #4285f4, #0f9d58); border-color: #f4b400; }
        .style-science h1, .style-science h2 { color: #fff; text-shadow: 2px 2px #333; }
        .style-science p { color: #e6e6e6; }
        .style-science .school-header { border-bottom: 2px solid #f4b400; color: #f4b400; }
        .style-science #closeButton { color: #fff; }

        .style-teachers-day p { color: #ffe0b2; }
        .style-teachers-day .school-header { border-bottom: 2px solid #ffe0b2; color: #ffe0b2; }

        .style-christmas h2 { color: #fff; }
        .style-christmas p { color: #ecf0f1; }
        .style-christmas .school-header { border-bottom: 2px solid #f1c40f; color: #f1c40f; }
        .style-christmas #closeButton { color: #f1c40f; }

        #popupContent h1 { font-family: 'Baloo Da 2', sans-serif; font-size: 3.5em; margin: 0 0 10px 0; letter-spacing: 3px; }
        #popupContent h2 { font-family: 'Noto Serif Bengali', serif; font-size: 2em; margin: 0 0 15px 0; }
        #popupContent p { font-family: 'Noto Serif Bengali', serif; font-size: 1.3em; margin: 10px 0 0 0; line-height: 1.5; }
        
        @media (max-width: 600px) {

            #popupContent h2 { font-size: 1.4em; }
            #popupContent p { font-size: 1.1em; }
            .school-header { font-size: 0.95em; }
            #closeButton { top: 10px; right: 15px; font-size: 26px; }
        }

            { name: "শুভ বড়দিন", month: 11, date: 25, durationDays: 5, styleClass: "style-christmas", icon: "🎄", title: "বড়দিনের আনন্দ ও শান্তি সকলের জীবনে আসুক।", subtitle: "Merry Christmas! 🎁" }
        ];
        
        // =======================================
        // ২. কনফেটি ও ক্রমান্বয়িক ক্লোজ ফাংশন (Queue Logic)
        // =======================================
        let activeEventsQueue = []; // আজকের সব ম্যাচিং ইভেন্টের তালিকা রাখার ফাঁকা কিউ
        
        function createConfetti(count = 50) {
            const colors = ['#f7d794', '#ff6b81', '#70a1ff', '#2ed573', '#ffa502', '#fff'];
            const confettiContainer = document.getElementById('confetti-container');
            confettiContainer.innerHTML = ''; 

            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 5 + 's';
                confetti.style.animationDuration = Math.random() * 5 + 5 + 's'; 
                confetti.style.width = Math.random() * 8 + 5 + 'px';
                confetti.style.height = confetti.style.width;
                confettiContainer.appendChild(confetti);
            }
        }

        window.closePopup = function(event) {
            const overlay = document.getElementById('eventPopupOverlay');
            const content = document.getElementById('popupContent');
            
            if (overlay && (event.target === overlay || event.target.id === 'closeButton' || event.target.classList.contains('popup-cancel-btn'))) {
                
                // বর্তমান পপ-আপ বন্ধের ছোট অ্যানিমেশন
                content.style.transition = "transform 0.4s cubic-bezier(0.36, 0, 0.66, -0.56), opacity 0.4s";
                content.style.transform = "scale(0) rotate(-10deg)"; 
                
                // কিউ (Queue) থেকে বর্তমান প্রদর্শিত ইভেন্টটি বাদ দেওয়া হচ্ছে
                activeEventsQueue.shift();
                
                setTimeout(() => {
                    // যদি আরও ইভেন্ট লাইনে বাকি থাকে, তবে সেটি ক্রমান্বয়ে দেখাবে
                    if (activeEventsQueue.length > 0) {
                        content.style.transform = "scale(0.9)"; // পরবর্তী অ্যানিমেশনের জন্য রিসেট
                        injectPopupContent(activeEventsQueue[0]); 
                    } else {
                        // কোনো ইভেন্ট বাকি না থাকলে সম্পূর্ণ উইন্ডো বন্ধ হবে
                        overlay.style.opacity = '0'; 
                        setTimeout(() => {
                            overlay.style.display = 'none';
                            if (window.parent && window.parent.document) {
                                const iframe = window.parent.document.getElementById('popup-iframe');
                                if (iframe) iframe.style.display = 'none';
                            }
                        }, 400);
                    }
                }, 400); 
            }
        }

        // আজকের দিনের সকল সঠিক ইভেন্ট খুঁজে বের করার ফাংশন
        function getActiveEventsList() {
            const today = new Date();
            const currentMonth = today.getMonth();
            const currentDay = today.getDate();
            const currentYear = today.getFullYear();
            const matchingEvents = [];

            for (const event of eventSchedule) {
                // ১. যদি কোনো নোটিশ সব সময়ের জন্য (alwaysShow) সেট করা থাকে
                if (event.alwaysShow) {
                    matchingEvents.push(event);
                    continue;
                }

                // ২. সাধারণ নির্দিষ্ট তারিখের ইভেন্ট যাচাই
                const eventStart = new Date(currentYear, event.month, event.date);
                const eventEnd = new Date(eventStart);
                eventEnd.setDate(eventEnd.getDate() + event.durationDays - 1); 
                const todayStartOfDay = new Date(currentYear, currentMonth, currentDay);

                if (todayStartOfDay >= eventStart && todayStartOfDay <= eventEnd) {
                    matchingEvents.push(event); 
                }
            }
            return matchingEvents;
        }
        
        function injectPopupContent(event) {
            const contentDiv = document.getElementById('popupContent');
            const overlayDiv = document.getElementById('eventPopupOverlay');
        
            if (contentDiv && overlayDiv) {
                if (window.parent && window.parent.document) {
                    const iframe = window.parent.document.getElementById('popup-iframe');
                    if (iframe) iframe.style.display = 'block'; 
                }
                
                contentDiv.className = '';
                contentDiv.classList.add(event.styleClass);

                // ডাইনামিক কন্টেন্ট তৈরিতে সাবটাইটেল নাকি কাস্টম HTML (যেমন টেবিল) বসবে তা নির্ধারণ করা
                let bodyContent = '';
                if (event.customHTML) {
                    bodyContent = event.customHTML;
                } else {
                    bodyContent = `<p>**${event.subtitle || ''}**</p>`;
                }

                contentDiv.innerHTML = `
                    <span id="closeButton" onclick="closePopup(event)">&times;</span>
                    <p class="school-header">
                        পাতপুকুর হাই স্কুলের পক্ষ থেকে -<br>
                        <span style="font-size: 0.8em; font-weight: 500;">[On behalf of Pathpukur High School (H.S.)]</span>
                    </p>
                    <h2>${event.name} ${event.icon || ''}</h2>
                    <h1>${event.title || ''}</h1>
                    ${bodyContent}
                    <br>
                    <button class="popup-cancel-btn" onclick="closePopup(event)">Cancel</button>
                `;

                overlayDiv.style.display = 'flex';
                overlayDiv.style.opacity = '1'; 
                
                // কনফেটি ইফেক্ট ম্যানেজমেন্ট
                if (event.styleClass === 'style-new-year' || event.styleClass === 'style-christmas') {
                    createConfetti(80); 
                } else if (event.styleClass === 'style-national' || event.styleClass === 'style-childrens-day' || event.styleClass === 'style-result') {
                    createConfetti(45);
                } else {
                    createConfetti(15); 
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            // আজকের সব ইভেন্টের লিস্ট কিউ (Queue) তে নেওয়া হলো
            activeEventsQueue = getActiveEventsList();
            
            // যদি অন্তত একটি ইভেন্টও থাকে, তবে প্রথমটি প্রদর্শন করা হবে
            if (activeEventsQueue.length > 0) {
                injectPopupContent(activeEventsQueue[0]);
            }
        });
    </script>
